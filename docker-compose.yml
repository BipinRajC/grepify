services:
  postgres:
    image: postgres:16-alpine
    container_name: grepify_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: grepify
      POSTGRES_USER: grepify
      POSTGRES_PASSWORD: grepify_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/server/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  qdrant:
    image: qdrant/qdrant
    container_name: grepify_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

volumes:
  pg_data:
